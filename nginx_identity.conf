# Add these blocks inside the existing HTTPS server { } for bkweb3.bigk.co.uk
# (the same server block that already has /maintenance/api/ and /maintenance/).
#
# carbo-identity API runs on 127.0.0.1:8003 (systemd: carbo-identity).
# The CIS shell (static files) is served at /cis/.

    # --- Identity API ---
    location /identity/api/ {
        proxy_pass http://127.0.0.1:8003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- CIS shell (single viewer for managers) ---
    location /cis/ {
        alias /opt/carbo/cis/shell/;
        try_files $uri $uri/ /cis/index.html;
    }

# Add this block inside the existing HTTPS server { } for bkweb3.bigk.co.uk
# (the same server block that already has /maintenance/api/ and /maintenance/).
#
# carbo-identity API runs on 127.0.0.1:8004 (systemd: carbo-identity).
# Note: 8003 is producers-api on Big-K. Port map: 8001 maintenance, 8002 quality, 8003 producers, 8004 identity.
# (The CIS app download folder is configured separately in Carbo-CIS/nginx_cis.conf.)

    # --- Identity API ---
    location /identity/api/ {
        proxy_pass http://127.0.0.1:8004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
